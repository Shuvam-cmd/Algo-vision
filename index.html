<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=5.0"
    />

    <!-- Primary Meta Tags - Basic SEO for non-JS crawlers -->
    <title>
      AlgoVision - Interactive DSA & Algorithm Visualization Platform
    </title>
    <meta
      name="title"
      content="AlgoVision - Interactive DSA & Algorithm Visualization Platform"
    />
    <meta
      name="description"
      content="Learn Data Structures and Algorithms through interactive visualizations. Explore sorting and searching algorithms with real-time animations and performance insights."
    />
    <meta
      name="keywords"
      content="DSA Visualizer, algorithms, data structures, sorting visualization, searching visualization, algorithm animation, computer science learning"
    />
    <meta name="author" content="Shuvam Kumar Das" />

    <!-- Pre-connect to domain for faster loading -->
    <link rel="preconnect" href="https://coder-army-algo-arena.vercel.app" />

    <!-- Page load optimization - Preload critical assets -->
    <link rel="preload" href="/logo.png" as="image" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta
      property="og:url"
      content="https://coder-army-algo-arena.vercel.app/"
    />
    <meta
      property="og:title"
      content="AlgoVision - Interactive DSA & Algorithm Visualization Platform"
    />
    <meta
      property="og:description"
      content="Visualize and understand Data Structures and Algorithms through interactive animations and step-by-step execution."
    />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta
      property="twitter:url"
      content="https://coder-army-algo-arena.vercel.app/"
    />
    <meta
      property="twitter:title"
      content="AlgoVision - Interactive DSA & Algorithm Visualization Platform"
    />
    <meta
      property="twitter:description"
      content="Explore sorting and searching algorithms with interactive visualizations and real-time execution insights."
    />
    <meta property="twitter:image" content="/og-image.png" />

    <!-- Theme color for browser UI -->
    <meta name="theme-color" content="#0f172a" />

    <!-- Crawler directives -->
    <meta name="robots" content="index, follow" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://coder-army-algo-arena.vercel.app" />

    <!-- Web app manifest for PWA capabilities -->
    <link rel="manifest" href="/manifest.json" />
  </head>

    <script type="module" src="/src/main.jsx"></script>
